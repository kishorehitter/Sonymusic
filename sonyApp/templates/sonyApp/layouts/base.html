{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sony Music India - Premium Music Entertainment{% endblock %}</title>
    <link rel="icon" href="{% static 'images/favicon.ico' %}">

    <!-- Bootstrap (LOCAL) -->
    <link rel="stylesheet" href="{% static 'bootstrap/css/bootstrap.min.css' %}">
    <script src="{% static 'bootstrap/js/bootstrap.bundle.min.js' %}"></script>

    <!-- Bootstrap Icons (LOCAL) -->
    <link rel="stylesheet" href="{% static 'bootstrap-icons/font/bootstrap-icons.css' %}">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courgette&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Main Content -->
    {% block content %}{% endblock %}

    
    <!-- Core Utilities (always loaded) -->
    <script src="{% static 'js/utils.js' %}"></script>
    
    <!-- Page-specific scripts -->
    {% block scripts %}{% endblock %}
    <!-- ── Page transition spinner ── -->
    <div id="pageSpinner" style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(3px);
    z-index:99999;
    align-items:center;
    justify-content:center;
    ">
    <div style="
        width:48px;height:48px;
        border-radius:50%;
        border:3px solid rgba(255,23,68,0.15);
        border-top-color:rgba(255,23,68,0.85);
        animation:spinnerRot 0.7s linear infinite;
    "></div>
    </div>

    <style>
    @keyframes spinnerRot {
    to { transform: rotate(360deg); }
    }
    </style>

    <script>
    (function() {
    var spinner = document.getElementById('pageSpinner');

    // Show on any internal link click
    document.addEventListener('click', function(e) {
        var link = e.target.closest('a');
        if (!link) return;

        var href = link.getAttribute('href');
        if (!href) return;

        // Skip: external links, anchors, javascript:, new tab, download
        if (
        href.startsWith('http') ||
        href.startsWith('#')    ||
        href.startsWith('javascript') ||
        href.startsWith('mailto') ||
        link.target === '_blank' ||
        link.hasAttribute('download') ||
        e.ctrlKey || e.metaKey || e.shiftKey
        ) return;

        spinner.style.display = 'flex';
    });

    // Hide on back/forward navigation
    window.addEventListener('pageshow', function() {
        spinner.style.display = 'none';
    });
    })();
    </script>
</body>
</html>
